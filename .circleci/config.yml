version: 2.1

jobs:
  build:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt

  lint:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - run:
          name: Install tools
          command: |
            python -m pip install --upgrade pip
            pip install flake8
      - run:
          name: Run lint
          command: |
            flake8 .

  test:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt
      - run:
          name: Run tests
          command: |
            PYTHONPATH=. pytest -q

workflows:
  version: 2
  pipeline:
    jobs:
      - build
      - lint
      - test

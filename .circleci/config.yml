version: 2.1

jobs:
  test:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - run:
          name: install
          command: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt
      - run:
          name: pytest
          command: |
            pytest -q

workflows:
  tests:
    jobs:
      - test

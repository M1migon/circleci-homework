version: 2.1

jobs:
  lint:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - run:
          name: install tools
          command: |
            pip install flake8 black
      - run: flake8 .
      - run: black --check .

  test:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - run:
          name: install pytest
          command: |
            pip install pytest
      - run: pytest

  build:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - run: python -c "print('build ok')"

workflows:
  version: 2
  pipeline:
    jobs:
      - lint
      - test
      - build

version: 2.1

jobs:
  lint:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - run: pip install flake8 black
      - run: flake8 .
      - run: black --check .

  test:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - run: pip install pytest
      - run: pytest

  build:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - run: python -c "print('Build successful')"

workflows:
  version: 2
  test_pipeline:
    jobs:
      - lint
      - test
      - build
